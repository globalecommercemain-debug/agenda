function dk(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function ti(){const j=new Date().getDay();return j===0?6:j-1}
function fm(m){if(m>=60){const h=Math.floor(m/60),r=m%60;return r?`${h}h${r}m`:`${h}h`}return`${m}m`}

// ---- SYNC ----

function setSyncStatus(state, text) {
  syncState = state;
  const el = document.getElementById('sync');
  el.className = 'sync-status sync-' + state;
  el.textContent = text;
}

const API_CONFIGURED = API_URL && API_URL.startsWith("https://script.google.com/");
let lastSavedJson = "";

async function apiGet(params) {
  const url = `${API_URL}?${new URLSearchParams(params).toString()}&_t=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP " + r.status);
  return await r.json();
}

async function apiPost(data) {
  // Use a hidden form + iframe to POST to Apps Script (avoids CORS entirely)
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error("timeout")), 10000);
    
    // Create hidden iframe to receive response
    const iframeName = "saveFrame" + Date.now();
    const iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);
    
    // Create and submit form
    const form = document.createElement("form");
    form.method = "POST";
    form.action = API_URL;
    form.target = iframeName;
    form.style.display = "none";
    
    // Add data as hidden fields
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "payload";
    input.value = JSON.stringify(data);
    form.appendChild(input);
    
    document.body.appendChild(form);
    
    iframe.onload = () => {
      clearTimeout(timeout);
      // Clean up
      setTimeout(() => {
        document.body.removeChild(iframe);
        document.body.removeChild(form);
      }, 100);
      resolve({ ok: true });
    };
    
    iframe.onerror = () => {
      clearTimeout(timeout);
      document.body.removeChild(iframe);
      document.body.removeChild(form);
      reject(new Error("iframe error"));
    };
    
    form.submit();
  });
}

  }

  try {
    setSyncStatus("pending", "sync...");
    const data = await apiGet({ action: "load", date: dk() });
    if (data.error) throw new Error(data.error);
    
    const cloudChecks = data.checks || {};
    const cloudSummary = data.summary || "";
    const cloudCount = Object.keys(cloudChecks).filter(k => cloudChecks[k]).length;
    const localCount = Object.keys(chk).filter(k => chk[k]).length;
    
    // Use whichever has more completed tasks (merge strategy: most progress wins)
    if (cloudCount >= localCount && cloudCount > 0) {
      chk = cloudChecks;
      summary = cloudSummary || summary;
    }
    
    lastSavedJson = JSON.stringify(chk);
    localStorage.setItem(`agenda:${dk()}`, JSON.stringify({checks:chk,summary}));
    setSyncStatus("ok", "✓ sync");
  } catch (e) {
    console.error("Load error:", e);
    setSyncStatus("err", "offline");
  }
}

function scheduleSave() {
  // Always save locally immediately
  localStorage.setItem(`agenda:${dk()}`, JSON.stringify({checks:chk,summary}));

  if (!API_CONFIGURED) return;

  // Debounce cloud save by 2s
  if (saveTimer) clearTimeout(saveTimer);
  setSyncStatus("pending", "salvando...");
  saveTimer = setTimeout(async () => {
    const currentJson = JSON.stringify(chk);
    if (currentJson === lastSavedJson) {
      setSyncStatus("ok", "✓ sync");
      return;
    }
    
    try {
      await apiGet({
        action: "save",
        date: dk(),
        checks: JSON.stringify(chk),
        summary: summary
      });
      lastSavedJson = currentJson;
      setSyncStatus("ok", "✓ sync");
    } catch (e) {
      console.error("Save error:", e);
      // Fallback: try POST via form
      try {
        await apiPost({ action: "save", date: dk(), checks: chk, summary });
        lastSavedJson = currentJson;
        setSyncStatus("ok", "✓ sync");
      } catch (e2) {
        console.error("POST fallback error:", e2);
        setSyncStatus("err", "offline");
      }
    }
  }, 2000);
}

// ---- RENDER ----

function render() {
  const d=new Date(),
  mo=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"],
  wd=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
  document.getElementById('wd').textContent=wd[d.getDay()];
  document.getElementById('fd').textContent=`${d.getDate()} de ${mo[d.getMonth()]} de ${d.getFullYear()}`;

  // Days
  const de=document.getElementById('days');de.innerHTML='';
  D.forEach((day,i)=>{
    const b=document.createElement('button');b.className='db'+(i===sel?' a':'');b.textContent=day.slice(0,3);
    if(i===ti()){const dot=document.createElement('div');dot.className='dd';dot.style.background=i===sel?'#58A6FF':'#3FB950';b.appendChild(dot)}
    b.onclick=()=>{sel=i;render()};de.appendChild(b)
  });

  const dn=D[sel],tasks=S[dn]||[],
  wh=tasks.filter(x=>x.b||x.w).reduce((s,x)=>s+(x.d||0),0)/60,
  tot=tasks.filter(x=>x.d>0).length,
  done=Object.keys(chk).filter(k=>k.startsWith(dn+'-')&&chk[k]).length;

  // Stats
  const se=document.getElementById('stats'),
  st=done>=tot&&tot>0?'🟢 Dia completo!':done/tot>.7?'Quase lá...':done/tot>.3?'Seguindo firme':'Bora começar',
  sc=done>=tot&&tot>0?'#3FB950':done/tot>.5?'#E5A700':'#F0F6FC';
  se.innerHTML=`
  <div class="sc" style="background:rgba(88,166,255,0.06);border:1px solid rgba(88,166,255,0.12)"><div class="sl">Horas de trabalho</div><div class="sv" style="color:#58A6FF">${wh.toFixed(1)}h</div></div>
  <div class="sc" style="background:rgba(63,185,80,0.06);border:1px solid rgba(63,185,80,0.12)"><div class="sl">Progresso</div><div class="sv" style="color:#3FB950">${done}/${tot}</div></div>
  <div class="sc" style="background:${done>=tot&&tot>0?'rgba(63,185,80,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${done>=tot&&tot>0?'rgba(63,185,80,0.25)':'rgba(255,255,255,0.06)'}"><div class="sl">Status</div><div style="font-size:14px;font-weight:700;color:${sc}">${st}</div></div>`;

  // Tasks
  const te=document.getElementById('tasks');te.innerHTML='';
  tasks.forEach((task,idx)=>{
    const key=`${dn}-${idx}`,ck=!!chk[key],ib=task.b,ic=task.w,hc=task.d>0,col=CO[task.p];
    const row=document.createElement('div');
    let cls='tr';
    if(ck)cls+=' ck';else if(ib)cls+=' bk';else if(ic)cls+=' cm';else cls+=' nm';
    if(hc)cls+=' cl';
    row.className=cls;
    if(hc)row.onclick=()=>{chk[key]=!chk[key];scheduleSave();render()};

    if(hc){const cb=document.createElement('div');cb.className='cb'+(ck?' ck':'');cb.style.border=ck?'2px solid #3FB950':`2px solid ${col}44`;if(ck)cb.innerHTML='<span class="cms">✓</span>';row.appendChild(cb)}
    else{const sp=document.createElement('div');sp.className='sp';row.appendChild(sp)}

    const tm=document.createElement('span');tm.className='tt';tm.textContent=task.t;row.appendChild(tm);
    const pd=document.createElement('span');pd.className='pd';pd.style.background=col;pd.style.opacity=ck?'0.4':'0.8';row.appendChild(pd);
    const nm=document.createElement('span');nm.className='tn';nm.style.fontSize=(ib||ic)?'14px':'13px';nm.style.fontWeight=(ib||ic)?'700':'500';nm.style.color=ck?'#8B949E':ib?'#F0F6FC':ic?'#58A6FF':'#C9D1D9';nm.style.textDecoration=ck?'line-through':'none';nm.textContent=task.n;row.appendChild(nm);
    if(task.d>0){const du=document.createElement('span');du.className='td';du.textContent=fm(task.d);row.appendChild(du)}
    te.appendChild(row)
  });

  // Summary
  const sumEl = document.getElementById('summary');
  sumEl.value = summary;
}

// ---- INIT ----

(async function init() {
  sel = ti();
  await loadFromCloud();
  render();

  // Summary save
  document.getElementById('summary').addEventListener('input', (e) => {
    summary = e.target.value;
    scheduleSave();
  });

  // Re-sync every 30s (only pull if not currently saving)
  setInterval(async () => {
    if (API_CONFIGURED && !document.hidden && !saveTimer) {
      try {
        const data = await apiGet({ action: "load", date: dk() });
        if (!data.error) {
          const cloudChecks = data.checks || {};
          const cloudCount = Object.keys(cloudChecks).filter(k => cloudChecks[k]).length;
          const localCount = Object.keys(chk).filter(k => chk[k]).length;
          
          // Only update if cloud has more progress
          if (cloudCount > localCount) {
            chk = cloudChecks;
            summary = data.summary || summary;
            lastSavedJson = JSON.stringify(chk);
            localStorage.setItem(`agenda:${dk()}`, JSON.stringify({checks:chk,summary}));
            render();
          }
          setSyncStatus("ok", "✓ sync");
        }
      } catch(e) {}
    }
  }, 30000);
})();
</script>
